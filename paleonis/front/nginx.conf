server {
    listen 80;
    server_name _;

    # --- Sert les fichiers statiques du frontend ---
    location / {
        root  /usr/share/nginx/html;
        index index.html;
    }

    # --- Reverse proxy : tout ce qui commence par /api/ part vers le conteneur API ---
    # "api" est le nom du service Docker ; nginx le resout vers l'IP du conteneur.
    # Cote navigateur, on ne voit qu'UNE seule adresse (le front), ce qui evite
    # les soucis de CORS et garde la base + l'API caches du monde exterieur.
    location /api/ {
        proxy_pass         http://api:3000/api/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }
}
